<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 10분! 비즈니스 일본어 30일 마스터 🍙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #7f5539; /* 포근한 초코 브라운 */
            --primary-light: #f5ebe0; /* 부드러운 라떼 크림 */
            --accent: #ddb892; /* 밀크티 베이지 */
            --bg: #fffcf2; /* 바닐라 크림 지면 */
            --surface: #ffffff;
            --border: #e6ccb2;
            --text-main: #4a3e3d;
            --text-muted: #9c8986;
            --success: #606c38;
            --success-bg: #f4f7f4;
            --error: #bc6c25;
            --yellow-accent: #f4a261;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Gaegu', 'Noto Sans KR', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 15px 10px;
            background-image: radial-gradient(var(--border) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--surface);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 0px var(--border);
            display: flex;
            flex-direction: column;
            min-height: 850px;
            border: 4px solid var(--primary);
        }

        .app-header {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border-bottom: 4px solid var(--primary);
            text-align: center;
        }
        
        .app-header h1 { 
            font-family: 'Gaegu', cursive; 
            font-size: calc(20px + 1vw); 
            font-weight: 700; 
            line-height: 1.3;
            word-break: keep-all;
        }
        
        .nav-tabs { display: flex; gap: 6px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .nav-btn { 
            background: white; border: 2px solid var(--primary); color: var(--primary); 
            padding: 8px 14px; font-size: 17px; font-weight: 700; cursor: pointer; 
            border-radius: 15px; transition: all 0.2s; font-family: 'Gaegu', cursive;
            box-shadow: 0 4px 0px var(--primary); white-space: nowrap;
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0px var(--primary); }
        .nav-btn.active { background-color: var(--primary); color: white; box-shadow: none; transform: translateY(4px); }

        .app-content { flex-grow: 1; padding: 20px 12px; display: none; }
        .app-content.active { display: block; }

        .progress-banner { background-color: #ffffff; border: 3px dashed var(--primary); border-radius: 20px; padding: 15px; margin-bottom: 25px; }
        .progress-text { font-family: 'Gaegu', cursive; font-size: 24px; color: var(--primary); text-align: center; margin-bottom: 8px; }
        .progress-bar-container { width: 100%; background-color: var(--primary-light); border-radius: 15px; height: 14px; overflow: hidden; border: 2px solid var(--primary); }
        .progress-bar-fill { height: 100%; background-color: var(--yellow-accent); width: 0%; transition: width 0.4s ease; }

        /* 💻 PC 전용 대형 30일 격자 그리드 구조 */
        .pc-roadmap-view { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 15px; }

        /* 📱 모바일 전용 아날로그 다이어리 레이아웃 구조 */
        .mobile-diary-view { display: none; min-height: 500px; }
        .diary-sidebar { width: 50px; background-color: var(--primary-light); display: flex; flex-direction: column; border-right: 3px solid var(--primary); }
        .week-tab {
            flex: 1; display: flex; align-items: center; justify-content: center;
            writing-mode: vertical-rl; text-orientation: upright;
            font-family: 'Gaegu', cursive; font-size: 15px; font-weight: 700; cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.08); background-color: var(--primary-light);
        }
        .week-tab.active { background-color: var(--surface); color: var(--primary); border-left: 5px solid var(--primary); width: 54px; z-index: 2; }
        .diary-panel { flex: 1; padding: 15px 10px; background-color: var(--surface); }
        .mobile-day-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        /* 공통 데일리 학습 카드 디자인 */
        .day-card { 
            background-color: #ffffff; border: 2px solid var(--border); border-radius: 16px; 
            padding: 12px 6px; cursor: pointer; transition: all 0.2s ease; text-align: center;
            box-shadow: 0 3px 0px var(--primary-light); display: flex; flex-direction: column;
            justify-content: space-between; min-height: 105px;
        }
        .day-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .day-card.completed { background-color: var(--success-bg); border-color: var(--success); }
        .day-num { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); }
        .day-title { font-size: 16px; font-weight: 700; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        .day-status { font-size: 13px; font-weight: 700; color: var(--text-muted); }

        /* 🧠 학습 엔진(Learning Engine) 인프라 */
        .engine-mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-toggle-btn { flex: 1; padding: 10px; border: 2px solid var(--primary); background: white; border-radius: 12px; font-family: 'Gaegu'; font-size: 18px; font-weight: 700; cursor: pointer; color: var(--primary); }
        .mode-toggle-btn.active { background: var(--primary); color: white; }

        /* 💬 매니저 대화형 모드 UI 상자 */
        .manager-chat-container { background: #ffffff; border: 3px solid var(--primary); border-radius: 20px; min-height: 300px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .chat-timeline { flex-grow: 1; overflow-y: auto; max-height: 320px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; }
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 18px; line-height: 1.4; position: relative; animation: fadeInUp 0.3s ease; }
        .chat-bubble.manager { background: var(--primary-light); color: var(--text-main); align-self: flex-start; border-top-left-radius: 4px; }
        .chat-bubble.manager code { font-family: 'Roboto Mono', monospace; font-size: 20px; color: var(--error); font-weight: 700; display: block; margin-top: 5px; }
        
        /* 🎴 플립형 카드 학습 모드 UI 상자 */
        .flip-cards-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .flip-card-scene { perspective: 600px; width: 100%; height: 130px; cursor: pointer; }
        .flip-card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; }
        .flip-card-scene.flipped .flip-card-inner { transform: rotateX(180deg); }
        .flip-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; border: 2px solid var(--primary); padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .flip-card-front { background: white; color: var(--text-main); }
        .flip-card-back { background: var(--bg); color: var(--primary); transform: rotateX(180deg); }

        .selector-container { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; background: var(--primary-light); padding: 12px 20px; border-radius: 18px; border: 2px solid var(--primary); text-align: center; }
        .selector-label { font-size: 20px; font-weight: 700; color: var(--primary); }
        .round-select { padding: 8px 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 17px; font-weight: 700; color: var(--primary); font-family: 'Gaegu'; cursor: pointer; background: white; width: 100%; }

        .quiz-box { background-color: #ffffff; border-radius: 25px; padding: 20px 15px; border: 3px solid var(--primary); box-shadow: 6px 6px 0px var(--primary-light); }
        .quiz-header { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .answer-zone { background-color: var(--bg); border: 3px dashed var(--border); min-height: 85px; border-radius: 18px; display: flex; gap: 8px; align-items: center; justify-content: center; padding: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .answer-zone.correct { border-color: var(--success); background-color: var(--success-bg); border-style: solid; }
        .answer-zone.wrong { border-color: var(--error); background-color: var(--error-bg); border-style: solid; }
        .word-pool { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .word-chip { background-color: white; border: 2px solid var(--border); padding: 10px 16px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s; box-shadow: 0 3px 0px var(--primary-light); }
        .word-chip.selected { opacity: 0.2; pointer-events: none; }
        .placed-chip { background-color: var(--primary); color: white; padding: 8px 14px; border-radius: 10px; font-size: 18px; font-weight: 700; }
        .quiz-controls { text-align: center; display: flex; flex-direction: column; gap: 8px; }
        
        .btn { padding: 12px; border-radius: 18px; font-size: 20px; font-weight: 700; cursor: pointer; border: 2px solid var(--primary); font-family: 'Gaegu'; transition: all 0.2s; width: 100%; }
        .btn-primary { background-color: var(--yellow-accent); color: white; box-shadow: 0 4px 0px var(--primary); }
        .btn-secondary { background-color: #ffffff; color: var(--primary); box-shadow: 0 3px 0px var(--primary); }

        .vocab-list-item { background: #ffffff; border: 2px solid var(--border); padding: 15px; border-radius: 18px; margin-bottom: 12px; border-left: 5px solid var(--accent); }
        .vocab-list-item code { font-family: 'Roboto Mono', monospace; font-size: 20px; display: block; margin-bottom: 4px; color: var(--primary); font-weight: 700; }
        .vocab-list-item p { font-size: 18px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(74, 62, 61, 0.5); z-index: 100; justify-content: center; align-items: center; padding: 12px; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        .modal-content { background-color: white; width: 100%; max-width: 620px; border-radius: 30px; padding: 25px; position: relative; border: 4px solid var(--primary); max-height: 85vh; overflow-y: auto; font-family: 'Gaegu'; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 26px; cursor: pointer; color: var(--text-muted); }
        .review-box { background: var(--bg); border: 2px dashed var(--primary); padding: 15px; border-radius: 18px; margin-top: 12px; }
        .review-line { margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--border); font-size: 18px; }
        .review-line code { font-family: 'Roboto Mono', monospace; color: var(--primary); font-size: 20px; font-weight: 700; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 💻 데스크톱 해상도 확장 오버라이딩 */
        @media (min-width: 769px) {
            body { padding: 40px 20px; }
            .app-header { flex-direction: row; justify-content: space-between; padding: 25px 40px; }
            .nav-tabs { width: auto; }
            .pc-roadmap-view { display: grid; }
            .mobile-diary-view { display: none !important; }
            .flip-cards-grid { grid-template-columns: repeat(2, 1fr); }
            .selector-container { flex-direction: row; text-align: left; padding: 15px 25px; }
            .round-select { width: auto; }
            .quiz-controls { flex-direction: row; }
            .btn { width: auto; }
            .app-content { padding: 40px; }
        }
        
        /* 📱 모바일 해상도 전환 오버라이딩 */
        @media (max-width: 768px) {
            .pc-roadmap-view { display: none !important; }
            .mobile-diary-view { display: flex; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>🍙 비즈니스 일본어 30일 마스터</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab(event, 'dashboard')">🍡 홈</button>
                <button class="nav-btn" onclick="switchTab(event, 'learning')">📖 학습하기</button>
                <button class="nav-btn" onclick="switchTab(event, 'quiz')">🧩 퀴즈방</button>
                <button class="nav-btn" onclick="switchTab(event, 'vocab')">🔍 표현장</button>
            </div>
        </div>

        <div id="dashboard" class="app-content active">
            <div class="progress-banner">
                <div class="progress-text" id="progressText">0일 완수! 목표를 향해 멋지게 나아가는 중이에요! 🚀</div>
                <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            </div>
            
            <div class="pc-roadmap-view" id="pcRoadmapGrid"></div>
            
            <div class="mobile-diary-view">
                <aside class="diary-sidebar" id="mobileWeekSidebar"></aside>
                <main class="diary-panel">
                    <div class="week-title-box">
                        <h2 id="mobileWeekTitle">Week 1: 사내 기본 소통</h2>
                        <p id="mobileWeekGoal">🎯 목표: 출근 인사 및 수락 매너</p>
                    </div>
                    <div class="mobile-day-grid" id="mobileDayGrid"></div>
                </main>
            </div>
        </div>

        <div id="learning" class="app-content">
            <div class="selector-container">
                <span class="selector-label">📖 학습 타깃 날짜 선택:</span>
                <select id="learningDaySelect" class="round-select" onchange="onLearningDayChange()"></select>
            </div>
            
            <div class="engine-mode-selector">
                <button class="mode-toggle-btn active" id="btnModeChat" onclick="switchLearningMode('chat')">💬 매니저 대화 모드</button>
                <button class="mode-toggle-btn" id="btnModeCard" onclick="switchLearningMode('card')">🎴 카드 뒤집기 모드</button>
            </div>

            <div id="learningChatArea" class="manager-chat-container">
                <div class="chat-timeline" id="chatTimeline"></div>
                <button class="btn btn-primary" id="chatNextBtn" onclick="advanceChatStep()">다음 표현 배우기 ➡️</button>
            </div>

            <div id="learningCardArea" class="flip-cards-grid" style="display:none;"></div>
        </div>

        <div id="quiz" class="app-content">
            <div class="selector-container">
                <span class="selector-label">🎯 퀴즈 데이 선택:</span>
                <select id="quizDaySelect" class="round-select" onchange="onQuizDayChange()"></select>
            </div>
            <div class="quiz-box">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; color: var(--primary); font-size: 22px;">
                    <span id="quizStep">1 / 10 단계</span>
                    <span id="quizScore">성공 개수: 0</span>
                </div>
                <div class="quiz-header" id="questionText">문제를 불러오는 중입니다...</div>
                <div class="answer-zone" id="answerZone"></div>
                <div class="word-pool" id="wordPool"></div>
                <div class="quiz-controls">
                    <button class="btn btn-secondary" onclick="clearAnswer()">다시 하기</button>
                    <button class="btn btn-primary" id="actionBtn" onclick="checkAnswer()">정답 확인! ✨</button>
                </div>
                <div class="feedback-msg" id="feedbackMsg" style="text-align: center; margin-top: 20px; font-weight: 700; font-size: 22px;"></div>
            </div>
        </div>

        <div id="vocab" class="app-content">
            <div class="selector-container">
                <span class="selector-label">🔍 일차별 전량 표현 검색:</span>
                <select id="vocabDaySelect" class="round-select" onchange="renderVocab()"></select>
            </div>
            <div id="vocabContainer"></div>
        </div>
    </div>

    <div class="modal" id="dayModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">❌</button>
            <h2 id="modalDayNum">DAY 01</h2>
            <h3 id="modalDayTitle">과정명</h3>
            <div id="modalDayBody"></div>
        </div>
    </div>

    <script>
        const totalDays = 30;
        let selectedDay = 1;
        let currentWeek = 1;
        let currentQIdx = 0;
        let currentAns = [];
        let learningChatIndex = 0;
        let activeLearningMode = 'chat';

        const curriculumWeeks = {
            1: { title: "Week 1: 사내 기본 소통 모듈", goal: "출근인사, 지시 수락 및 업무 공유 매너", start: 1, end: 5 },
            2: { title: "Week 2: 주간 보고 및 사내 협업", goal: "주간 업무 보고 노하우 및 메신저/화상 회의 연동", start: 6, end: 10 },
            3: { title: "Week 3: 미팅 고도화 및 메일 작성", goal: "회의 중 찬반 피칭과 외부 파트너 메일 첫인사", start: 11, end: 15 },
            4: { title: "Week 4: 외부 파트너 실전 응대", goal: "미팅 시간 조율 매너, 전화 수신 및 명함 교환", start: 16, end: 20 },
            5: { title: "Week 5: 위기 대응 및 조건 협상", goal: "일정 지연 사전 조율 및 마감 기한 조절 네고", start: 21, end: 25 },
            6: { title: "Week 6: 최종 조율 및 비즈니스 마스터", goal: "미팅 변경 최종 확정 및 종합 졸업 테스트", start: 26, end: 30 }
        };

        const curriculumTitles = {
            1: "상사의 지시 수락과 기한 확인 ⏰", 2: "마감 확답과 완료 보고 📝", 3: "갑작스러운 트러블 대면 보고 🚨",
            4: "자리 비움 상태 공유하기 🏃", 5: "타 부서에 협조 및 리소스 요청 🤝", 6: "한 주를 마무리하는 주간 완료 보고 📊",
            7: "1주차 핵심 회화 종합 다지기 💮", 8: "Slack 메신저의 정중한 첫 마디 💬", 9: "긴급한 장애 상황 전파하기 💻",
            10: "온라인 미팅 접속과 음성 체크 🎧", 11: "회의 중 찬성/반대 의사 표시 ✋", 12: "내 의견을 부드럽게 제안하기 💡",
            13: "미팅 회의록 작성 및 공유 📑", 14: "2주차 핵심 회화 종합 다지기 💮", 15: "외부 파트너 이메일 첫인사 ✉️",
            16: "파일 첨부 안내와 일정 조율 🗓️", 17: "전화 수신 및 담당자 연결 매너 📞", 18: "부재중 상사를 위한 메모 남기기 ✏️",
            19: "방문객 마중과 사무실 안내 🏢", 20: "비즈니스 명함 교환 프로토콜 📇", 21: "3주차 핵심 회화 종합 다지기 💮",
            22: "일정 지연에 대한 사전 사과 ⏳", 23: "시스템 오류 수정 정중히 요청하기 🛠️", 24: "클라이언트 불만 사항 경청과 사과 🙏",
            25: "납기 마감 기한 연장 네고하기 📈", 26: "미팅 시간 변경 양해 구하기 ⏰", 27: "최종 의사결정 확정 확인 표현 🔔",
            28: "사내 돌발 상황 통합 트레이닝 🏡", 29: "외부 바이어 최종 조건 조율 🌐", 30: "30일 완성 최종 마스터 테스트 🏆"
        };

        // 완벽 정제 교정 150개 비즈니스 일본어 데이터 맵 (1대1 매칭형 타깃 번역 탑재)
        const masterExpressions = {
            1: [

        function initSelectors() {
            const lSelect = document.getElementById('learningDaySelect');
            const qSelect = document.getElementById('quizDaySelect');
            const vSelect = document.getElementById('vocabDaySelect');
            lSelect.innerHTML = ''; qSelect.innerHTML = ''; vSelect.innerHTML = '';
            for(let i=1; i<=totalDays; i++) {
                const opt = `<option value="${i}">DAY ${String(i).padStart(2, '0')}</option>`;
                lSelect.innerHTML += opt; qSelect.innerHTML += opt; vSelect.innerHTML += opt;
            }
        }

        /* 💻 데스크톱 전용 30일 격자 그리드 배치 장치 */
        function renderPCRoadmap() {
            const grid = document.getElementById('pcRoadmapGrid');
            grid.innerHTML = '';
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            
            for(let i=1; i<=totalDays; i++) {
                const card = document.createElement('div');
                const isDone = completedList.includes(i);
                card.className = `day-card ${isDone ? 'completed' : ''}`;
                card.onclick = () => triggerDayAction(i);
                card.innerHTML = `
                    <div class="day-num">${String(i).padStart(2, '0')}</div>
                    <div class="day-title">${curriculumTitles[i]}</div>
                    <div class="day-status">${isDone ? '💮 완료' : '☕ 대기'}</div>
                `;
                grid.appendChild(card);
            }
        }

        /* 📱 모바일 전용 세로 플로팅 인덱스 사이드바 제어 */
        function renderMobileSidebar() {
            const sidebar = document.getElementById('mobileWeekSidebar');
            sidebar.innerHTML = '';
            for(let i=1; i<=6; i++) {
                const tab = document.createElement('div');
                tab.className = `week-tab ${currentWeek === i ? 'active' : ''}`;
                tab.innerText = `WEEK ${i}`;
                tab.onclick = () => { currentWeek = i; renderMobileSidebar(); renderMobileDashboard(); };
                sidebar.appendChild(tab);
            }
        }

        function renderMobileDashboard() {
            const grid = document.getElementById('mobileDayGrid');
            grid.innerHTML = '';
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            const w = curriculumWeeks[currentWeek];

            document.getElementById('mobileWeekTitle').innerText = w.title;
            document.getElementById('mobileWeekGoal').innerText = `🎯 목표: ${w.goal}`;

            for(let i = w.start; i <= w.end; i++) {
                const card = document.createElement('div');
                const isDone = completedList.includes(i);
                card.className = `day-card ${isDone ? 'completed' : ''}`;
                card.onclick = () => triggerDayAction(i);
                card.innerHTML = `
                    <div class="day-num">${String(i).padStart(2, '0')}</div>
                    <div class="day-title">${curriculumTitles[i]}</div>
                    <div class="day-status">${isDone ? '💮 완료' : '☕ 대기'}</div>
                `;
                grid.appendChild(card);
            }
            updateGauges();
        }

        function updateGauges() {
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            const pct = Math.round((completedList.length / totalDays) * 100);
            document.getElementById('progressText').innerText = `${completedList.length}일 완수! 목표를 향해 멋지게 나아가는 중이에요! 🚀`;
            document.getElementById('progressBarFill').style.width = `${pct}%`;
        }

        function triggerDayAction(day) {
            selectedDay = day;
            document.getElementById('learningDaySelect').value = day;
            document.getElementById('quizDaySelect').value = day;
            document.getElementById('vocabDaySelect').value = day;
            switchTab(null, 'learning');
            initLearningEngine();
        }

        function switchTab(e, tabId) {
            document.querySelectorAll('.app-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            
            if(e) { e.currentTarget.classList.add('active'); } 
            else {
                const btnIdx = { 'dashboard': 0, 'learning': 1, 'quiz': 2, 'vocab': 3 }[tabId];
                document.querySelectorAll('.nav-btn')[btnIdx].classList.add('active');
            }
            if(tabId === 'dashboard') { renderPCRoadmap(); renderMobileDashboard(); }
            if(tabId === 'learning') { initLearningEngine(); }
            if(tabId === 'quiz') { currentQIdx = 0; loadQuiz(); }
            if(tabId === 'vocab') { renderVocab(); }
        }

        /* 🧠 대화형 + 카드 플립 하이브리드 학습 기능 제어 */
        function onLearningDayChange() {
            selectedDay = parseInt(document.getElementById('learningDaySelect').value);
            initLearningEngine();
        }

        function switchLearningMode(mode) {
            activeLearningMode = mode;
            document.getElementById('btnModeChat').classList.toggle('active', mode === 'chat');
            document.getElementById('btnModeCard').classList.toggle('active', mode === 'card');
            document.getElementById('learningChatArea').style.display = mode === 'chat' ? 'flex' : 'none';
            document.getElementById('learningCardArea').style.display = mode === 'card' ? 'grid' : 'none';
            initLearningEngine();
        }

        function initLearningEngine() {
            if(activeLearningMode === 'chat') {
                learningChatIndex = 0;
                document.getElementById('chatTimeline').innerHTML = '';
                document.getElementById('chatNextBtn').style.display = 'inline-block';
                document.getElementById('chatNextBtn').innerText = "첫 번째 표현 배우기 ➡️";
                advanceChatStep();
            } else {
                renderFlipCards();
            }
        }

        function advanceChatStep() {
            const timeline = document.getElementById('chatTimeline');
            const list = masterExpressions[selectedDay];
            
            if(learningChatIndex < list.forEach.length || learningChatIndex < 5) {
                const data = list[learningChatIndex];
                if(!data) return;
                
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble manager';
                bubble.innerHTML = `
                    <b>🗣️ 표현 0${learningChatIndex+1}:</b> ${data.kr}
                    <code>${data.js.join(' ')}</code>
                    <div style="font-size:15px; color:var(--error); margin-top:3px;">🎧 [발음]: ${data.pron}</div>
                `;
                timeline.appendChild(bubble);
                timeline.scrollTop = timeline.scrollHeight;
                
                learningChatIndex++;
                document.getElementById('chatNextBtn').innerText = learningChatIndex === 5 ? "학습 완료! 도장 찍기 💮" : "다음 표현 보기 ➡️";
            } else {
                // 5개 표현 열람 완료 시 스탬프 추가 연동
                let completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
                if(!completedList.includes(selectedDay)) {
                    completedList.push(selectedDay);
                    localStorage.setItem('completedDays', JSON.stringify(completedList));
                }
                alert(`🎉 DAY ${String(selectedDay).padStart(2, '0')} 대화형 학습이 완료되어 대시보드에 연동되었습니다! 이제 퀴즈방에서 실력을 확인해 보세요!`);
                switchTab(null, 'dashboard');
            }
        }

        function renderFlipCards() {
            const area = document.getElementById('learningCardArea');
            area.innerHTML = '';
            const list = masterExpressions[selectedDay];
            
            list.forEach((data, idx) => {
                const scene = document.createElement('div');
                scene.className = 'flip-card-scene';
                scene.onclick = () => scene.classList.toggle('flipped');
                scene.innerHTML = `
                    <div class="flip-card-inner">
                        <div class="flip-card-face flip-card-front">
                            <span style="font-size:13px; color:var(--text-muted);">표현 0${idx+1} (터치하여 오픈)</span>
                            <strong style="font-size:22px; color:var(--primary); margin:5px 0;">${data.js.join(' ')}</strong>
                            <span style="font-size:14px; color:var(--error);">🎧 ${data.pron}</span>
                        </div>
                        <div class="flip-card-face flip-card-back">
                            <span style="font-weight:700; font-size:18px;">📌 상황 맥락 뜻</span>
                            <p style="font-size:16px; margin-top:5px; color:var(--text-main);">${data.kr}</p>
                        </div>
                    </div>
                `;
                area.appendChild(scene);
            });
        }

        /* 🧩 조각 퍼즐 자동 선지 생성 퀴즈 엔진 */
        function onQuizDayChange() {
            selectedDay = parseInt(document.getElementById('quizDaySelect').value);
            currentQIdx = 0;
            loadQuiz();
        }

        function loadQuiz() {
            currentAns = [];
            document.getElementById('answerZone').className = 'answer-zone';
            document.getElementById('answerZone').innerHTML = '<span style="color: var(--text-muted);">단어 조각을 알맞은 순서대로 클릭해 주세요!</span>';
            document.getElementById('feedbackMsg').style.display = 'none';
            
            const btn = document.getElementById('actionBtn');
            btn.style.display = 'inline-block';
            btn.innerText = "정답 확인! ✨";

            const list = masterExpressions[selectedDay];
            const dataIndex = currentQIdx % list.length;
            const item = list[dataIndex];

            document.getElementById('quizStep').innerText = `${currentQIdx + 1} / 10 단계`;
            document.getElementById('quizScore').innerText = `성공 개수: ${currentQIdx}`;
            document.getElementById('questionText').innerText = `💡 실무 상황: ${item.kr}`;

            let pool = [...item.js];
            let altDay = selectedDay === 1 ? 2 : 1;
            if(masterExpressions[altDay]) {
                pool.push(masterExpressions[altDay][0].js[0]);
                pool.push(masterExpressions[altDay][1].js[0]);
            }
            
            // 피셔-예이츠 셔플 알고리즘 적용
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            const poolZone = document.getElementById('wordPool');
            poolZone.innerHTML = '';
            pool.forEach((word, idx) => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.innerText = word;
                chip.id = `qchip-${idx}`;
                chip.onclick = () => {
                    if(chip.classList.contains('selected')) return;
                    currentAns.push({word, id: `qchip-${idx}`});
                    chip.classList.add('selected');
                    updateAnswerZone();
                };
                poolZone.appendChild(chip);
            });
        }

        function updateAnswerZone() {
            const zone = document.getElementById('answerZone');
            if(currentAns.length === 0) {
                zone.innerHTML = '<span style="color: var(--text-muted);">단어 조각을 알맞은 순서대로 클릭해 주세요!</span>';
                return;
            }
            zone.innerHTML = '';
            currentAns.forEach(item => {
                const node = document.createElement('div');
                node.className = 'placed-chip';
                node.innerText = item.word;
                zone.appendChild(node);
            });
        }

        function clearAnswer() {
            currentAns.forEach(item => {
                const el = document.getElementById(item.id);
                if(el) el.classList.remove('selected');
            });
            currentAns = [];
            updateAnswerZone();
        }

        function checkAnswer() {
            const feedback = document.getElementById('feedbackMsg');
            const zone = document.getElementById('answerZone');
            const btn = document.getElementById('actionBtn');
            
            const list = masterExpressions[selectedDay];
            const dataIndex = currentQIdx % list.length;
            const targetAns = list[dataIndex].js;

            if(btn.innerText.includes("👉") || btn.innerText.includes("종료")) {
                currentQIdx++;
                if(currentQIdx >= 10) {
                    feedback.innerText = "🎉 대단합니다! 10문항 복습 미션을 완전 돌파하셨습니다!";
                    btn.style.display = 'none';
                } else {
                    loadQuiz();
                }
                return;
            }

            const userWords = currentAns.map(item => item.word);
            let isCorrect = userWords.length === targetAns.length && userWords.every((v, i) => v === targetAns[i]);

            feedback.style.display = 'block';
            if(isCorrect) {
                feedback.innerText = "💮 정답입니다! 아주 정확한 어순 배열입니다.";
                feedback.style.color = "var(--success)";
                zone.className = 'answer-zone correct';
                btn.innerText = currentQIdx === 9 ? "퀴즈 스테이지 종료하기 🏁" : "다음 문장 검증하기 👉";
            } else {
                feedback.innerText = "❌ 순서가 올바르지 않습니다. 다시 조립해 볼까요?";
                feedback.style.color = "var(--error)";
                zone.className = 'answer-zone wrong';
            }
        }

        function renderVocab() {
            const day = document.getElementById('vocabDaySelect').value;
            const container = document.getElementById('vocabContainer');
            container.innerHTML = '';
            const list = masterExpressions[day];
            
            list.forEach((item, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'vocab-list-item';
                itemDiv.innerHTML = `
                    <code>[표현 0${idx+1}] ${item.js.join(' ')}</code>
                    <p style="color:var(--error); font-weight:700;">🎧 발음: ${item.pron}</p>
                    <p style="color:var(--text-main); margin-top:3px;">📌 상황 맥락: ${item.kr}</p>
                `;
                container.appendChild(itemDiv);
            });
        }

        function closeModal() { document.getElementById('dayModal').classList.remove('active'); }
    </script>
</body>
</html>
