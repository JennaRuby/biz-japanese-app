<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 10분! 비즈니스 일본어 30일 마스터 🍙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #7f5539; 
            --primary-light: #f5ebe0; 
            --accent: #ddb892; 
            --bg: #fffcf2; 
            --surface: #ffffff;
            --border: #e6ccb2;
            --text-main: #4a3e3d;
            --text-muted: #9c8986;
            --success: #606c38;
            --success-bg: #f4f7f4;
            --error: #bc6c25;
            --yellow-accent: #f4a261;
            --coaching-light: #fdfbf7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Gaegu', 'Noto Sans KR', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 15px 10px;
            background-image: radial-gradient(var(--border) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--surface);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 0px var(--border);
            display: flex;
            flex-direction: column;
            min-height: 850px;
            border: 4px solid var(--primary);
        }

        .app-header {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-bottom: 4px solid var(--primary);
            text-align: center;
        }
        
        .app-header h1 { 
            font-family: 'Gaegu', cursive; 
            font-size: calc(18px + 1.2vw); 
            font-weight: 700; 
            line-height: 1.2;
            word-break: keep-all;
        }
        
        .nav-tabs { display: flex; gap: 6px; justify-content: center; width: 100%; }
        .nav-btn { 
            flex: 1; padding: 8px 4px; font-size: 15px; font-weight: 700; 
            background: white; border: 2px solid var(--primary); color: var(--primary); 
            cursor: pointer; border-radius: 12px; transition: all 0.2s; font-family: 'Gaegu', cursive;
            box-shadow: 0 3px 0px var(--primary); white-space: nowrap; text-align: center;
        }
        .nav-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0px var(--primary); }
        .nav-btn.active { background-color: var(--primary); color: white; box-shadow: none; transform: translateY(3px); }

        .app-content { flex-grow: 1; padding: 20px 10px; display: none; }
        .app-content.active { display: block; }

        .progress-banner { background-color: #ffffff; border: 3px dashed var(--primary); border-radius: 20px; padding: 15px; margin-bottom: 25px; }
        .progress-text { font-family: 'Gaegu', cursive; font-size: 24px; color: var(--primary); text-align: center; margin-bottom: 8px; }
        .progress-bar-container { width: 100%; background-color: var(--primary-light); border-radius: 15px; height: 14px; overflow: hidden; border: 2px solid var(--primary); }
        .progress-bar-fill { height: 100%; background-color: var(--yellow-accent); width: 0%; transition: width 0.4s ease; }

        .pc-roadmap-view { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 15px; }

        /* 📱 모바일 조약돌 가로 탭 다이어리 인테리어 최적화 */
        .mobile-diary-view { display: none; flex-direction: column; gap: 16px; min-height: 500px; }
        .mobile-week-nav { display: flex; gap: 8px; overflow-x: auto; padding: 4px 4px 10px 4px; scrollbar-width: none; }
        .mobile-week-nav::-webkit-scrollbar { display: none; }
        
        .mobile-week-btn {
            padding: 8px 16px; background: white; border: 2px solid var(--primary); border-radius: 20px;
            font-size: 15px; font-weight: 700; color: var(--primary); cursor: pointer;
            white-space: nowrap; box-shadow: 0 3px 0px var(--border); transition: all 0.15s ease; font-family: 'Gaegu';
        }
        .mobile-week-btn.active { background-color: var(--primary); color: white; box-shadow: none; transform: translateY(4px); }

        .diary-panel { flex: 1; padding: 5px 2px; }
        .week-title-box { background: white; border: 2px dashed var(--primary); border-radius: 18px; padding: 14px; margin-bottom: 16px; text-align: center; box-shadow: 0 4px 0px var(--primary-light); }
        .week-title-box h2 { font-size: 20px; color: var(--primary); font-weight: 700; }
        .week-title-box p { font-size: 15px; color: var(--text-muted); margin-top: 3px; font-weight: 700; }
        
        /* 모바일 격자 배열 가로 균등 분할 마감 */
        .mobile-day-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .day-card { 
            background-color: #ffffff; border: 2px solid var(--border); border-radius: 16px; 
            padding: 12px 6px; cursor: pointer; transition: all 0.2s ease; text-align: center;
            box-shadow: 0 3px 0px var(--primary-light); display: flex; flex-direction: column;
            justify-content: space-between; min-height: 105px;
        }
        .day-card:hover { border-color: var(--primary); }
        .day-card.completed { background-color: var(--success-bg); border-color: var(--success); box-shadow: 0 3px 0px rgba(96, 108, 56, 0.15); }
        .day-num { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); }
        .day-title { font-size: 15px; font-weight: 700; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        .day-status { font-size: 13px; font-weight: 700; color: var(--text-muted); }

        .api-config-box { background: #fffdfa; border: 2px dashed var(--border); border-radius: 16px; padding: 8px 16px; margin-bottom: 20px; }
        .api-active-state { display: flex; justify-content: space-between; align-items: center; font-weight: 700; color: var(--success); font-size: 15px; font-family: 'Gaegu'; }
        .api-input-row { display: flex; gap: 10px; margin-top: 5px; }
        .api-input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--primary); font-size: 14px; }

        .coaching-canvas { background-color: var(--coaching-light); border: 3px solid var(--primary); border-radius: 20px; padding: 16px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.02); }
        .speaker-badge-bar { display: flex; gap: 10px; background: white; padding: 10px 15px; border-radius: 14px; border: 2px solid var(--border); }
        .badge-tile { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; color: var(--text-main); }
        .badge-tile .status-dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; transition: background 0.2s; }
        .badge-tile.speaking .status-dot { background: var(--yellow-accent); animation: pulseDot 1s infinite; }
        
        .lecture-chat-viewport { background: white; border: 2px solid var(--border); border-radius: 16px; height: 380px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .coaching-msg { margin-bottom: 2px; line-height: 1.5; font-size: 17px; }
        .coaching-msg.manager { color: var(--text-main); border-left: 4px solid var(--primary); padding-left: 10px; }
        .coaching-msg.user { color: var(--primary); background: var(--primary-light); padding: 8px 12px; border-radius: 12px; align-self: flex-end; max-width: 85%; font-weight: 700; border-top-right-radius: 2px; }
        .lecture-jp-block { font-family: 'Roboto Mono', monospace; font-size: 24px; font-weight: 700; color: var(--error); margin: 8px 0; display: block; background: #fffcf9; padding: 10px; border-radius: 8px; border: 1px dashed var(--accent); }
        .lecture-feedback-panel { background: rgba(244, 162, 97, 0.08); border-left: 3px solid var(--yellow-accent); padding: 8px 12px; margin-top: 6px; border-radius: 4px; color: #d67d34; font-size: 15px; font-weight: 700; }

        .coaching-controls { display: flex; gap: 12px; justify-content: center; align-items: center; margin-top: 5px; }
        .mic-toggle-trigger { background: white; border: 3px solid var(--primary); color: var(--primary); padding: 12px; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: all 0.2s; box-shadow: 0 4px 0 var(--border); }
        .mic-toggle-trigger.mic-on { background: #ea4335; color: white; border-color: #bc2519; box-shadow: 0 4px 0 #8b130a; animation: pulseMic 1.5s infinite; }
        .mic-toggle-trigger:active { transform: translateY(3px); box-shadow: none; }

        .engine-mode-selector { display: flex; gap: 12px; margin-bottom: 22px; width: 100%; }
        .mode-toggle-btn { 
            flex: 1; padding: 10px 15px; font-size: 18px; font-weight: 700; 
            background: white; border: 2px solid var(--primary); color: var(--primary); 
            cursor: pointer; border-radius: 16px; transition: all 0.15s ease; font-family: 'Gaegu', cursive;
            box-shadow: 0 4px 0px var(--primary); text-align: center;
        }
        .mode-toggle-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0px var(--primary); }
        .mode-toggle-btn.active { background-color: var(--primary); color: white; box-shadow: none; transform: translateY(4px); }

        .flip-cards-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .flip-card-scene { perspective: 600px; width: 100%; height: 130px; cursor: pointer; }
        .flip-card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; }
        .flip-card-scene.flipped .flip-card-inner { transform: rotateX(180deg); }
        .flip-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; border: 2px solid var(--primary); padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .flip-card-front { background: white; color: var(--text-main); }
        .flip-card-back { background: var(--bg); color: var(--primary); transform: rotateX(180deg); }

        .selector-container { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; background: var(--primary-light); padding: 12px 20px; border-radius: 18px; border: 2px solid var(--primary); text-align: center; }
        .selector-label { font-size: 20px; font-weight: 700; color: var(--primary); }
        .round-select { padding: 8px 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 17px; font-weight: 700; color: var(--primary); font-family: 'Gaegu'; cursor: pointer; background: white; width: 100%; }

        .quiz-box { background-color: #ffffff; border-radius: 25px; padding: 20px 15px; border: 3px solid var(--primary); box-shadow: 6px 6px 0px var(--primary-light); }
        .quiz-header { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .answer-zone { background-color: var(--bg); border: 3px dashed var(--border); min-height: 85px; border-radius: 18px; display: flex; gap: 8px; align-items: center; justify-content: center; padding: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .answer-zone.correct { border-color: var(--success); background-color: var(--success-bg); border-style: solid; }
        .answer-zone.wrong { border-color: var(--error); background-color: var(--error-bg); border-style: solid; }
        .word-pool { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .word-chip { background-color: white; border: 2px solid var(--border); padding: 10px 16px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s; box-shadow: 0 3px 0px var(--primary-light); }
        .word-chip.selected { opacity: 0.2; pointer-events: none; }
        .placed-chip { background-color: var(--primary); color: white; padding: 8px 14px; border-radius: 10px; font-size: 18px; font-weight: 700; }
        .quiz-controls { text-align: center; display: flex; flex-direction: column; gap: 8px; }
        
        .btn { padding: 12px; border-radius: 18px; font-size: 20px; font-weight: 700; cursor: pointer; border: 2px solid var(--primary); font-family: 'Gaegu'; transition: all 0.2s; width: 100%; }
        .btn-primary { background-color: var(--yellow-accent); color: white; box-shadow: 0 4px 0px var(--primary); }
        .btn-secondary { background-color: #ffffff; color: var(--primary); box-shadow: 0 3px 0px var(--primary); }

        .vocab-list-item { background: #ffffff; border: 2px solid var(--border); padding: 18px; border-radius: 18px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 0px var(--primary-light); }
        .vocab-list-item code { font-family: 'Roboto Mono', monospace; font-size: 22px; display: block; margin-bottom: 6px; color: var(--error); font-weight: 700; }
        .build-up-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
        .component-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 700; }
        .component-label { background: var(--primary-light); color: var(--primary); padding: 2px 8px; border-radius: 6px; font-size: 13px; font-family: sans-serif; white-space: nowrap; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(74, 62, 61, 0.5); z-index: 100; justify-content: center; align-items: center; padding: 12px; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        .modal-content { background-color: white; width: 100%; max-width: 620px; border-radius: 30px; padding: 25px; position: relative; border: 4px solid var(--primary); max-height: 85vh; overflow-y: auto; font-family: 'Gaegu'; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 26px; cursor: pointer; color: var(--text-muted); }
        .review-box { background: var(--bg); border: 2px dashed var(--primary); padding: 15px; border-radius: 18px; margin-top: 12px; }
        .review-line { margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--border); font-size: 18px; }
        .review-line code { font-family: 'Roboto Mono', monospace; color: var(--primary); font-size: 20px; font-weight: 700; }

        @keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
        @keyframes pulseDot { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        @media (min-width: 769px) {
            body { padding: 40px 20px; }
            .app-header { flex-direction: row; justify-content: space-between; padding: 20px 40px; }
            .nav-tabs { width: auto; gap: 10px; }
            .nav-btn { font-size: 18px; padding: 8px 20px; max-width: none; width: auto; }
            .pc-roadmap-view { display: grid; }
            .mobile-diary-view { display: none !important; }
            .flip-cards-grid { grid-template-columns: repeat(2, 1fr); }
            .selector-container { flex-direction: row; text-align: left; padding: 15px 25px; }
            .round-select { width: auto; }
            .quiz-controls { flex-direction: row; }
            .btn { width: auto; }
            .app-content { padding: 40px; }
        }
        
        @media (max-width: 768px) {
            .pc-roadmap-view { display: none !important; }
            .mobile-diary-view { display: flex !important; }
            .nav-btn { font-size: 14px; padding: 6px 0; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>🍙 비즈니스 일본어 30일 아카데미</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab(event, 'dashboard')">🍡 홈</button>
                <button class="nav-btn" onclick="switchTab(event, 'learning')">📖 학습하기</button>
                <button class="nav-btn" onclick="switchTab(event, 'quiz')">🧩 퀴즈방</button>
                <button class="nav-btn" onclick="switchTab(event, 'vocab')">🔍 표현장</button>
            </div>
        </div>

        <div id="dashboard" class="app-content active">
            <div class="progress-banner">
                <div class="progress-text" id="progressText">0일 완수! 목표를 향해 멋지게 나아가는 중이에요! 🚀</div>
                <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            </div>
            
            <div class="pc-roadmap-view" id="pcRoadmapGrid"></div>
            
            <div class="mobile-diary-view">
                <nav class="mobile-week-nav" id="mobileWeekSidebar"></nav>
                <main class="diary-panel">
                    <div class="week-title-box">
                        <h2 id="mobileWeekTitle">Week 1: 사내 기본 소통 모듈</h2>
                        <p id="mobileWeekGoal">🎯 목표: 로딩 중...</p>
                    </div>
                    <div class="mobile-day-grid" id="mobileDayGrid"></div>
                </main>
            </div>
        </div>

        <div id="learning" class="app-content">
            <div id="apiConfigContainer" class="api-config-box"></div>

            <div class="selector-container">
                <span class="selector-label">📖 학습 목표 일차 선택:</span>
                <select id="learningDaySelect" class="round-select" onchange="onLearningDayChange()"></select>
            </div>
            
            <div class="engine-mode-selector">
                <button class="mode-toggle-btn active" id="btnModeChat" onclick="switchLearningMode('chat')">📹 사토 쌤 라이브 과외</button>
                <button class="mode-toggle-btn" id="btnModeCard" onclick="switchLearningMode('card')">✨ 코어 패턴 카드</button>
            </div>

            <div id="learningChatArea" class="coaching-canvas">
                <div class="speaker-badge-bar">
                    <div class="badge-tile" id="badgeManager">
                        <div class="status-dot"></div> <span>👨‍💼 사토 선생님</span>
                    </div>
                    <div class="badge-tile" id="badgeUser">
                        <div class="status-dot"></div> <span>👩‍💻 Jenna (나)</span>
                    </div>
                </div>
                
                <div class="lecture-chat-viewport" id="zoomChatLog">
                    <div class="coaching-msg manager"><b>사토 선생님:</b> 라이브 코칭 세션 대기 중입니다. 하단의 [레슨 시작] 버튼을 터치해 주세요.</div>
                </div>

                <div class="coaching-controls">
                    <button class="btn btn-primary" id="zoomActionBtn" style="width:160px; font-size:18px;" onclick="startZoomMeeting()">레슨 시작 🟢</button>
                    <button class="mic-toggle-trigger" id="zoomMicBtn" style="display:none;" onclick="toggleToggleMic()"><i class="fa-solid fa-microphone"></i></button>
                </div>
            </div>

            <div id="learningCardArea" class="flip-cards-grid" style="none;"></div>
        </div>

        <div id="quiz" class="app-content">
            <div class="selector-container">
                <span class="selector-label">🎯 검증 퀴즈 데이:</span>
                <select id="quizDaySelect" class="round-select" onchange="onQuizDayChange()"></select>
            </div>
            <div class="quiz-box">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; color: var(--primary); font-size: 22px;">
                    <span id="quizStep">1 / 10 단계</span>
                    <span id="quizScore">성공 개수: 0</span>
                </div>
                <div class="quiz-header" id="questionText">문제를 세팅 중입니다...</div>
                <div class="answer-zone" id="answerZone"></div>
                <div class="word-pool" id="wordPool"></div>
                <div class="quiz-controls">
                    <button class="btn btn-secondary" onclick="clearAnswer()">다시 하기</button>
                    <button class="btn btn-primary" id="actionBtn" onclick="checkAnswer()">정답 확인! ✨</button>
                </div>
                <div class="feedback-msg" id="feedbackMsg" style="text-align: center; margin-top: 20px; font-weight: 700; font-size: 22px;"></div>
            </div>
        </div>

        <div id="vocab" class="app-content">
            <div class="selector-container">
                <span class="selector-label">🔍 일차별 마스터 북:</span>
                <select id="vocabDaySelect" class="round-select" onchange="renderVocab()"></select>
            </div>
            <div id="vocabContainer"></div>
        </div>
    </div>

    <div class="modal" id="dayModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">❌</button>
            <h2 id="modalDayNum">DAY 01</h2>
            <h3 id="modalDayTitle">과정명</h3>
            <div id="modalDayBody"></div>
        </div>
    </div>

    <script>
        const totalDays = 30;
        let selectedDay = 1;
        let currentWeek = 1;
        let currentQIdx = 0;
        let currentAns = [];
        let activeLearningMode = 'chat';
        
        let zoomConversationHistory = [];
        let speechRecognitionEngine = null;
        let isMicRecording = false;

        // 📱 모바일 7일 상시 다이어리 렌더링을 위한 주차 파티셔닝 재할당 완료 (Week 1~5 전체 표출)
        const curriculumWeeks = {
            1: { title: "Week 1: 사내 기본 소통 모듈", goal: "출근인사, 지시 수락 및 업무 공유 매너", start: 1, end: 7 },

        function renderPCRoadmap() {
            const grid = document.getElementById('pcRoadmapGrid'); grid.innerHTML = '';
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            for(let i=1; i<=totalDays; i++) {
                const card = document.createElement('div');
                card.className = `day-card ${(completedList.includes(i)) ? 'completed' : ''}`;
                card.onclick = () => openModal(i);
                card.innerHTML = `<div class="day-num">${String(i).padStart(2, '0')}</div><div class="day-title">${curriculumTitles[i] || '비즈니스 심화 실무 과정'}</div><div class="day-status">${(completedList.includes(i)) ? '💮 완료' : '☕ 대기'}</div>`;
                grid.appendChild(card);
            }
        }

        function renderMobileSidebar() {

            for(let i=1; i<=5; i++) {
                const tab = document.createElement('button');
                tab.className = `mobile-week-btn ${currentWeek === i ? 'active' : ''}`;
                tab.innerText = `🌸 WEEK ${i}`;
                tab.onclick = () => { currentWeek = i; renderMobileSidebar(); renderMobileDashboard(); };
                sidebar.appendChild(tab);
            }

        function renderMobileDashboard() {
            const grid = document.getElementById('mobileDayGrid'); grid.innerHTML = '';
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            const w = curriculumWeeks[currentWeek];
            document.getElementById('mobileWeekTitle').innerText = w.title;
            document.getElementById('mobileWeekGoal').innerText = `🎯 목표: ${w.goal}`;

            for(let i = w.start; i <= w.end; i++) {
                if(i > totalDays) continue; // 30일 초과 가드 스핀락 방지
                const card = document.createElement('div');
                card.className = `day-card ${(completedList.includes(i)) ? 'completed' : ''}`;
                card.onclick = () => openModal(i);
                card.innerHTML = `<div class="day-num">${String(i).padStart(2, '0')}</div><div class="day-title">${curriculumTitles[i] || '비즈니스 실전 과정'}</div><div class="day-status">${(completedList.includes(i)) ? '💮 완료' : '☕ 대기'}</div>`;

            document.getElementById('progressBarFill').style.width = `${pct}%`;

        function typeWriterHTML(element, html, speed, callback) {
            let i = 0; let currentHTML = "";
            clearInterval(element.typingTimer);
            element.typingTimer = setInterval(() => {
                if (i >= html.length) {
                    clearInterval(element.typingTimer);
                    if (callback) callback();
                    return;
                }
                if (html[i] === '<') {
                    let tagEnd = html.indexOf('>', i);
                    if (tagEnd !== -1) { currentHTML += html.substring(i, tagEnd + 1); i = tagEnd + 1; } 
                    else { currentHTML += html[i++]; }
                } else { currentHTML += html[i++]; }
                element.innerHTML = currentHTML;
                const logZone = document.getElementById('zoomChatLog'); logZone.scrollTop = logZone.scrollHeight;
            }, speed);
        }

            logZone.innerHTML = '<div class="coaching-msg manager"><i>사토 선생님과 오디오 채널 동기화 중... 🎧</i></div>';

            const targetExpressions = masterExpressions[selectedDay];
            const dataSummary = targetExpressions.map((e, idx) => `패턴 ${idx+1}: 일어문장[${e.js.join(' ')}], 한국어의미[${e.kr}], 뉘앙스해설[${e.comment}]`).join('\n');

            const systemPrompt = `당신은 일본 IT 기업의 스마트하고 다정다감한 30대 남성 상사이자, 스픽(Speak) 앱 수준의 초밀착형 드릴 스피킹 능력을 갖춘 '사토 선생님(佐藤先生)'입니다. 사용자의 이름은 'Jenna(ジェナ)'입니다.
            현재 배정된 학습 타깃 데이터는 다음과 같습니다:
            ${dataSummary}
            
            [사토 선생님의 독점 금지 및 스픽형 단계 교습 규칙]:
            1. 정보 과부하 절대 금지: 장황하고 긴 텍스트 설명은 절대 금지합니다. 모든 한국어 설명은 '핵심만 요약해서 무조건 딱 2줄 이내'로 핵심 뉘앙스(스프린트 마감, 비즈니스 우선순위 등)만 쏙쏙 뽑아 전개하세요.
            2. 철저한 턴 제어: 독점적으로 혼자 가상 대화를 생성해 자문자답하고 잘했다고 칭찬하지 마세요. 무조건 패턴 1개씩만 학습시킵니다.
               - 순서: 오늘 가르칠 [패턴 1]의 개념과 뜻을 한국어 1~2줄로 축약 브리핑 ➡️ 일어 문장 노출 ➡️ "Jenna, 따라 해보세요!"라고 한 뒤 답변을 들을 때까지 무조건 턴을 멈추고 대기.
               - 사용자가 답변하면 발음이나 억양 매칭 피드백을 '한국어 1줄'로 짧게 격려한 뒤, 즉시 그 문장을 써먹을 수 있는 아주 정형화된 쉬운 비즈니스 상황 질문을 일어로 1줄 던지고 다시 턴을 종료하고 대기.
            
            [출력 포맷 규격 - 군더더기 제로]:
            [사토 선생님의 코칭] (한국어로 콤팩트하게 요약한 가이드, 2줄 이내)
            佐藤先生: "(일본어 대사 딱 한 줄)"
            [🎧 발음/뉘앙스 팁] (1줄만)`;

            zoomConversationHistory = [{ role: 'user', parts: [{ text: systemPrompt + " 자, 오늘 대시보드에 지정된 패턴 1번 데이터에 대한 콤팩트한 2줄 이내 한국어 요약 렉처와 첫인사부터 명쾌하게 시작해 줘." }] }];
            callGeminiLive();
        }

        async function callGeminiLive() {
            const apiKey = localStorage.getItem('gemini_api_key_v3').trim();
            const logZone = document.getElementById('zoomChatLog');
            
            document.getElementById('badgeManager').classList.add('speaking');
            document.getElementById('badgeUser').classList.remove('speaking');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: zoomConversationHistory })
                });
                
                if (!response.ok) {
                    const errorResponseData = await response.json().catch(() => ({}));
                    const exactServerMessage = errorResponseData.error?.message || "정의되지 않은 서버 에러";
                    throw new Error(`구글 서버 반환코드 (${response.status}): ${exactServerMessage}`);
                }

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                let jpLine = "";
                if(reply.includes('佐藤先生:')) {
                    jpLine = reply.split('佐藤先生:')[1].split('\n')[0].replace(/"/g, '').trim();
                } else {
                    jpLine = reply.split('\n')[0];
                }

                zoomConversationHistory.push({ role: 'model', parts: [{ text: reply }] });

                const msgDiv = document.createElement('div');
                msgDiv.className = 'coaching-msg manager';
                logZone.appendChild(msgDiv);
                
                const formattedHtml = `<b>사토 선생님:</b><br><span style="font-size:16px; line-height:1.5; white-space:pre-wrap; color:var(--text-main);">${reply}</span>`;
                typeWriterHTML(msgDiv, formattedHtml, 20, () => {
                    if(jpLine) { executeNativeTTS(jpLine); }
                });

            } catch(e) {
                console.error("상세 트래킹 데이터:", e);
                logZone.innerHTML += `<div class="coaching-msg manager" style="color:var(--error); font-weight:700;">❌ 구동 오류 안내:<br>${e.message}</div>`;
            } finally {
                document.getElementById('badgeManager').classList.remove('speaking');
            }
        }

        function toggleToggleMic() {
            const micBtn = document.getElementById('zoomMicBtn');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) { alert("현재 기기가 음성 인식을 지원하지 않습니다."); return; }

            if(!speechRecognitionEngine) {
                speechRecognitionEngine = new SpeechRecognition();
                speechRecognitionEngine.lang = 'ko-KR'; 
                speechRecognitionEngine.interimResults = false;

                speechRecognitionEngine.onresult = function(e) {
                    const resultText = e.results[0][0].transcript;
                    const logZone = document.getElementById('zoomChatLog');
                    
                    const userDiv = document.createElement('div');
                    userDiv.className = 'coaching-msg user';
                    userDiv.innerHTML = `<b>Jenna:</b> 🎤 <i>${resultText}</i>`;
                    logZone.appendChild(userDiv);
                    logZone.scrollTop = logZone.scrollHeight;

                    zoomConversationHistory.push({ role: 'user', parts: [{ text: resultText }] });
                    callGeminiLive();
                };

                speechRecognitionEngine.onend = function() {
                    isMicRecording = false;
                    micBtn.classList.remove('mic-on');
                    document.getElementById('badgeUser').classList.remove('speaking');
                };
            }

            if(!isMicRecording) {
                speechRecognitionEngine.start();
                isMicRecording = true;
                micBtn.classList.add('mic-on');
                document.getElementById('badgeUser').classList.add('speaking');
            } else {
                speechRecognitionEngine.stop();
            }
        }

        let maleVoiceCached = null;
        function loadMaleVoice() {
            if(!('speechSynthesis' in window)) return;
            const voices = window.speechSynthesis.getVoices();
            maleVoiceCached = voices.find(v => v.lang.startsWith('ja') && 
                (v.name.toLowerCase().includes('otoya') || 
                 v.name.toLowerCase().includes('ichiro') || 
                 v.name.toLowerCase().includes('male')));
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadMaleVoice;
            loadMaleVoice();
        }

        function executeNativeTTS(rawText) {
            if('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const cleanText = rawText.replace(/\[.*?\]/g, "").replace(/[^\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\s]/g, "").trim();
                if(!cleanText) return;

                const voiceUtterance = new SpeechSynthesisUtterance(cleanText);
                voiceUtterance.lang = 'ja-JP';

                if(!maleVoiceCached) loadMaleVoice();
                if(maleVoiceCached) { voiceUtterance.voice = maleVoiceCached; }
                
                voiceUtterance.pitch = 0.95;  
                voiceUtterance.rate = 0.95;   
                window.speechSynthesis.speak(voiceUtterance);
            }
        }

        function renderFlipCards() {
            const area = document.getElementById('learningCardArea'); area.innerHTML = '';
            const list = masterExpressions[selectedDay];
            list.forEach((data, idx) => {
                const scene = document.createElement('div'); scene.className = 'flip-card-scene';
                scene.onclick = () => scene.classList.toggle('flipped');
                scene.innerHTML = `
                    <div class="flip-card-inner">
                        <div class="flip-card-face flip-card-front">
                            <span style="font-size:13px; color:var(--text-muted);">패턴 0${idx+1}</span>
                            <strong style="font-size:22px; color:var(--primary);">${data.js.join(' ')}</strong>
                            <span>🎧 ${data.pron}</span>
                        </div>
                        <div class="flip-card-face flip-card-back">
                            <span style="font-weight:700;">📌 뜻: ${data.kr}</span>
                            <p style="font-size:14px; margin-top:4px;">${data.comment}</p>
                        </div>
                    </div>`;
                area.appendChild(scene);
            });
        }

        function openModal(day) {
            document.getElementById('modalDayNum').innerText = `DAY ${String(day).padStart(2, '0')}`;
            document.getElementById('modalDayTitle').innerText = curriculumTitles[day];
            const list = masterExpressions[day];
            let listHtml = "";
            list.forEach((item, idx) => {
                listHtml += `<div class="review-line"><b>${idx+1}.</b> <code>${item.js.join(' ')}</code><div style="margin-top:4px; font-size:17px; color:var(--error)">🎧 발음: ${item.pron}</div><div style="font-size:17px; color:var(--primary)">📝 뜻: ${item.kr}</div></div>`;
            });
            document.getElementById('modalDayBody').innerHTML = `<div class="review-box"><h4>💡 오늘 대시보드 요약 프리뷰</h4>${listHtml}</div>`;
            document.getElementById('dayModal').classList.add('active');
        }
        function closeModal() { document.getElementById('dayModal').classList.remove('active'); }

        function onQuizDayChange() {
            selectedDay = parseInt(document.getElementById('quizDaySelect').value);
            currentQIdx = 0; loadQuiz();
        }

        function loadQuiz() {
            currentAns = [];
            document.getElementById('answerZone').className = 'answer-zone';
            document.getElementById('answerZone').innerHTML = '<span style="color: var(--text-muted);">단어 조각을 알맞은 순서대로 클릭해 주세요!</span>';
            document.getElementById('feedbackMsg').style.display = 'none';
            
            const btn = document.getElementById('actionBtn');
            btn.style.display = 'inline-block'; btn.innerText = "정답 확인! ✨";

            const list = masterExpressions[selectedDay];
            const dataIndex = currentQIdx % list.length;
            const item = list[dataIndex];

            document.getElementById('quizStep').innerText = `${currentQIdx + 1} / 10 단계`;
            document.getElementById('quizScore').innerText = `성공 개수: ${currentQIdx}`;
            
            if(currentQIdx >= 5) {
                document.getElementById('questionText').innerText = `🔥 [심화 챌린지] 실무 상황: ${item.kr} (방해 조각 포함)`;
            } else {
                document.getElementById('questionText').innerText = `💡 실무 상황: ${item.kr}`;
            }

            let pool = [...item.js];
            
            if(currentQIdx >= 5) {
                pool.push("に"); pool.push("で"); pool.push("ミーティング");
            } else {
                let altDay = selectedDay === 1 ? 2 : 1;
                if(masterExpressions[altDay]) {
                    pool.push(masterExpressions[altDay][0].js[0]); pool.push(masterExpressions[altDay][1].js[0]);
                }
            }
            
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            const poolZone = document.getElementById('wordPool'); poolZone.innerHTML = '';
            pool.forEach((word, idx) => {
                const chip = document.createElement('div');
                chip.className = 'word-chip'; chip.innerText = word; chip.id = `qchip-${idx}`;
                chip.onclick = () => {
                    if(chip.classList.contains('selected')) return;
                    currentAns.push({word, id: `qchip-${idx}`}); chip.classList.add('selected'); updateAnswerZone();
                };
                poolZone.appendChild(chip);
            });
        }

        function updateAnswerZone() {
            const zone = document.getElementById('answerZone');
            if(currentAns.length === 0) {
                zone.innerHTML = '<span style="color: var(--text-muted);">단어 조각을 알맞은 순서대로 클릭해 주세요!</span>'; return;
            }
            zone.innerHTML = '';
            currentAns.forEach(item => {
                const node = document.createElement('div'); node.className = 'placed-chip'; node.innerText = item.word; zone.appendChild(node);
            });
        }

        function clearAnswer() {
            currentAns.forEach(item => {
                const el = document.getElementById(item.id); if(el) el.classList.remove('selected');
            });
            currentAns = []; updateAnswerZone();
        }

        function checkAnswer() {
            const feedback = document.getElementById('feedbackMsg');
            const zone = document.getElementById('answerZone');
            const btn = document.getElementById('actionBtn');
            
            const list = masterExpressions[selectedDay];
            const dataIndex = currentQIdx % list.length;
            const targetAns = list[dataIndex].js;

            if(btn.innerText.includes("👉") || btn.innerText.includes("종료")) {
                currentQIdx++;
                if(currentQIdx >= 10) {
                    feedback.innerText = "🎉 축하합니다! 10개 문장의 검증 퍼즐을 완벽하게 수료하셨습니다!"; btn.style.display = 'none';
                } else { loadQuiz(); }
                return;
            }

            const userWords = currentAns.map(item => item.word);
            let isCorrect = userWords.length === targetAns.length && userWords.every((v, i) => v === targetAns[i]);

            feedback.style.display = 'block';
            if(isCorrect) {
                feedback.innerText = "💮 정답입니다! 유려하고 깔끔한 어순 배열입니다.";
                feedback.style.color = "var(--success)"; zone.className = 'answer-zone correct';
                btn.innerText = currentQIdx === 9 ? "퀴즈 스테이지 종료하기 🏁" : "다음 문장 검증하기 👉";
            } else {
                feedback.innerText = "❌ 순서가 올바르지 않습니다. 다시 조합해 볼까요?";
                feedback.style.color = "var(--error)"; zone.className = 'answer-zone wrong';
            }
        }

        function renderVocab() {
            const day = document.getElementById('vocabDaySelect').value;
            const container = document.getElementById('vocabContainer'); container.innerHTML = '';
            const list = masterExpressions[day];
            
            list.forEach((item, idx) => {
                const itemDiv = document.createElement('div'); itemDiv.className = 'vocab-list-item';
                
                let breakdownHtml = "";
                if(item.breakdown) {
                    item.breakdown.forEach(b => {
                        breakdownHtml += `
                            <div class="component-tag">
                                <span class="component-label">${b.t}</span>
                                <b style="color:var(--primary); font-family:sans-serif; font-size:14.5px;">${b.w}</b> : 
                                <span style="font-size:14px; color:var(--text-main); font-weight:700;">${b.d}</span>
                            </div>`;
                    });
                }

                itemDiv.innerHTML = `
                    <code>[패턴 0${idx+1}] ${item.js.join(' ')}</code>
                    <p style="color:var(--error); font-weight:700; font-size:16px;"><i class="fa-solid fa-volume-high"></i> 발음: ${item.pron}</p>
                    <p style="color:var(--primary); margin-top:3px; font-weight:700; font-size:17px;">📌 의미: ${item.kr}</p>
                    <div class="teacher-note" style="margin-top:6px; font-size:14.5px;">💡 코칭: ${item.comment}</div>
                    <div class="build-up-grid">
                        <div style="font-size:13.5px; font-weight:700; color:var(--text-muted); margin-bottom:2px;"><i class="fa-solid fa-wand-magic-sparkles"></i> 한 눈에 분석하는 코어 빌드업 테이블</div>
                        ${breakdownHtml}
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }
    </script>
