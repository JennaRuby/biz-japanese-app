<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 10분! 비즈니스 일본어 30일 마스터 🍙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Poppins:wght@600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #7f5539; 
            --primary-light: #f5ebe0; 
            --accent: #ddb892; 
            --bg: #fffcf2; 
            --surface: #ffffff;
            --border: #e6ccb2;
            --text-main: #4a3e3d;
            --text-muted: #9c8986;
            --success: #606c38;
            --success-bg: #f4f7f4;
            --error: #bc6c25;
            --yellow-accent: #f4a261;
            --zoom-dark: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Gaegu', 'Noto Sans KR', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 15px 10px;
            background-image: radial-gradient(var(--border) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--surface);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 0px var(--border);
            display: flex;
            flex-direction: column;
            min-height: 850px;
            border: 4px solid var(--primary);
        }

        .app-header {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-bottom: 4px solid var(--primary);
            text-align: center;
        }
        
        .app-header h1 { 
            font-family: 'Gaegu', cursive; 
            font-size: calc(18px + 1.2vw); 
            font-weight: 700; 
            line-height: 1.2;
            word-break: keep-all;
        }
        
        .nav-tabs { display: flex; gap: 6px; justify-content: center; width: 100%; }
        .nav-btn { 
            flex: 1; padding: 8px 4px; font-size: 15px; font-weight: 700; 
            background: white; border: 2px solid var(--primary); color: var(--primary); 
            cursor: pointer; border-radius: 12px; transition: all 0.2s; font-family: 'Gaegu', cursive;
            box-shadow: 0 3px 0px var(--primary); white-space: nowrap; text-align: center;
        }
        .nav-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0px var(--primary); }
        .nav-btn.active { background-color: var(--primary); color: white; box-shadow: none; transform: translateY(3px); }

        .app-content { flex-grow: 1; padding: 20px 10px; display: none; }
        .app-content.active { display: block; }

        .progress-banner { background-color: #ffffff; border: 3px dashed var(--primary); border-radius: 20px; padding: 15px; margin-bottom: 25px; }
        .progress-text { font-family: 'Gaegu', cursive; font-size: 24px; color: var(--primary); text-align: center; margin-bottom: 8px; }
        .progress-bar-container { width: 100%; background-color: var(--primary-light); border-radius: 15px; height: 14px; overflow: hidden; border: 2px solid var(--primary); }
        .progress-bar-fill { height: 100%; background-color: var(--yellow-accent); width: 0%; transition: width 0.4s ease; }

        .pc-roadmap-view { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 15px; }

        .mobile-diary-view { display: none; min-height: 500px; }
        .diary-sidebar { width: 45px; background-color: var(--primary-light); display: flex; flex-direction: column; border-right: 3px solid var(--primary); }
        .week-tab {
            flex: 1; display: flex; align-items: center; justify-content: center;
            writing-mode: vertical-rl; text-orientation: upright;
            font-family: 'Gaegu', cursive; font-size: 14px; font-weight: 700; cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.08); background-color: var(--primary-light);
        }
        .week-tab.active { background-color: var(--surface); color: var(--primary); border-left: 4px solid var(--primary); width: 49px; z-index: 2; }
        .diary-panel { flex: 1; padding: 15px 8px; background-color: var(--surface); }
        .mobile-day-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .day-card { 
            background-color: #ffffff; border: 2px solid var(--border); border-radius: 16px; 
            padding: 12px 6px; cursor: pointer; transition: all 0.2s ease; text-align: center;
            box-shadow: 0 3px 0px var(--primary-light); display: flex; flex-direction: column;
            justify-content: space-between; min-height: 105px;
        }
        .day-card.completed { background-color: var(--success-bg); border-color: var(--success); }
        .day-num { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); }
        .day-title { font-size: 15px; font-weight: 700; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        .day-status { font-size: 13px; font-weight: 700; color: var(--text-muted); }

        /* 🔐 API 동적 대시보드 박스 스타일 정의 */
        .api-config-box { background: #f8f9fa; border: 2px solid var(--primary); border-radius: 15px; padding: 12px; margin-bottom: 15px; }
        .api-active-state { display: flex; justify-content: space-between; align-items: center; font-weight: 700; color: var(--success); font-size: 16px; }
        .api-input-row { display: flex; gap: 10px; margin-top: 5px; }
        .api-input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--primary); font-size: 14px; }

        .zoom-window { background-color: var(--zoom-dark); border-radius: 20px; padding: 12px; display: flex; flex-direction: column; gap: 10px; color: white; margin-bottom: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .zoom-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .zoom-feed { background: #2a2a2a; border-radius: 12px; height: 140px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #444; }
        .zoom-feed.active-speaker { border-color: #0ebd59; }
        .zoom-feed .avatar { font-size: 44px; margin-bottom: 4px; }
        .zoom-feed .name-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 6px; font-size: 13px; font-family: sans-serif; }
        
        .zoom-chat-log { background: rgba(255,255,255,0.05); border-radius: 12px; height: 240px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 15px; font-family: sans-serif; }
        .zoom-msg { margin-bottom: 4px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 6px; }
        .zoom-msg.manager { color: #8ecae6; }
        .zoom-msg.user { color: #e9c46a; }
        .feedback-bubble { background: rgba(244, 162, 97, 0.15); border-left: 3px solid var(--yellow-accent); padding: 8px 12px; margin-top: 6px; border-radius: 6px; color: #f4a261; font-size: 14.5px; line-height: 1.4; }

        .zoom-controls-bar { display: flex; gap: 10px; justify-content: center; }
        .zoom-btn { background: #333; border: none; color: white; padding: 12px; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; transition: all 0.2s; }
        .zoom-btn.mic-on { background: #ea4335; animation: pulse 1.5s infinite; }
        .zoom-btn.active { background: #0ebd59; }

        .engine-mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-toggle-btn { flex: 1; padding: 10px; border: 2px solid var(--primary); background: white; border-radius: 12px; font-family: 'Gaegu'; font-size: 18px; font-weight: 700; cursor: pointer; color: var(--primary); }
        .mode-toggle-btn.active { background: var(--primary); color: white; }

        .flip-cards-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .flip-card-scene { perspective: 600px; width: 100%; height: 130px; cursor: pointer; }
        .flip-card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.4s; transform-style: preserve-3d; }
        .flip-card-scene.flipped .flip-card-inner { transform: rotateX(180deg); }
        .flip-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; border: 2px solid var(--primary); padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .flip-card-front { background: white; color: var(--text-main); }
        .flip-card-back { background: var(--bg); color: var(--primary); transform: rotateX(180deg); }

        .selector-container { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; background: var(--primary-light); padding: 12px 20px; border-radius: 18px; border: 2px solid var(--primary); text-align: center; }
        .selector-label { font-size: 20px; font-weight: 700; color: var(--primary); }
        .round-select { padding: 8px 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 17px; font-weight: 700; color: var(--primary); font-family: 'Gaegu'; cursor: pointer; background: white; width: 100%; }

        .quiz-box { background-color: #ffffff; border-radius: 25px; padding: 20px 15px; border: 3px solid var(--primary); box-shadow: 6px 6px 0px var(--primary-light); }
        .quiz-header { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; text-align: center; line-height: 1.4; }
        .answer-zone { background-color: var(--bg); border: 3px dashed var(--border); min-height: 85px; border-radius: 18px; display: flex; gap: 8px; align-items: center; justify-content: center; padding: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .answer-zone.correct { border-color: var(--success); background-color: var(--success-bg); border-style: solid; }
        .answer-zone.wrong { border-color: var(--error); background-color: var(--error-bg); border-style: solid; }
        .word-pool { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .word-chip { background-color: white; border: 2px solid var(--border); padding: 10px 16px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s; box-shadow: 0 3px 0px var(--primary-light); }
        .word-chip.selected { opacity: 0.2; pointer-events: none; }
        .placed-chip { background-color: var(--primary); color: white; padding: 8px 14px; border-radius: 10px; font-size: 18px; font-weight: 700; }
        .quiz-controls { text-align: center; display: flex; flex-direction: column; gap: 8px; }
        
        .btn { padding: 12px; border-radius: 18px; font-size: 20px; font-weight: 700; cursor: pointer; border: 2px solid var(--primary); font-family: 'Gaegu'; transition: all 0.2s; width: 100%; }
        .btn-primary { background-color: var(--yellow-accent); color: white; box-shadow: 0 4px 0px var(--primary); }
        .btn-secondary { background-color: #ffffff; color: var(--primary); box-shadow: 0 3px 0px var(--primary); }

        .vocab-list-item { background: #ffffff; border: 2px solid var(--border); padding: 15px; border-radius: 18px; margin-bottom: 12px; border-left: 5px solid var(--accent); }
        .vocab-list-item code { font-family: 'Roboto Mono', monospace; font-size: 20px; display: block; margin-bottom: 4px; color: var(--primary); font-weight: 700; }
        .vocab-list-item p { font-size: 18px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(74, 62, 61, 0.5); z-index: 100; justify-content: center; align-items: center; padding: 12px; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        .modal-content { background-color: white; width: 100%; max-width: 620px; border-radius: 30px; padding: 25px; position: relative; border: 4px solid var(--primary); max-height: 85vh; overflow-y: auto; font-family: 'Gaegu'; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 26px; cursor: pointer; color: var(--text-muted); }
        .review-box { background: var(--bg); border: 2px dashed var(--primary); padding: 15px; border-radius: 18px; margin-top: 12px; }
        .review-line { margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--border); font-size: 18px; }
        .review-line code { font-family: 'Roboto Mono', monospace; color: var(--primary); font-size: 20px; font-weight: 700; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 769px) {
            body { padding: 40px 20px; }
            .app-header { flex-direction: row; justify-content: space-between; padding: 20px 40px; }
            .nav-tabs { width: auto; gap: 10px; }
            .nav-btn { font-size: 18px; padding: 8px 20px; width: auto; }
            .pc-roadmap-view { display: grid; }
            .mobile-diary-view { display: none !important; }
            .zoom-grid { grid-template-columns: 1fr 1fr; }
            .flip-cards-grid { grid-template-columns: repeat(2, 1fr); }
            .selector-container { flex-direction: row; text-align: left; padding: 15px 25px; }
            .round-select { width: auto; }
            .quiz-controls { flex-direction: row; }
            .btn { width: auto; }
            .app-content { padding: 40px; }
        }
        
        @media (max-width: 768px) {
            .pc-roadmap-view { display: none !important; }
            .mobile-diary-view { display: flex; }
            .nav-btn { font-size: 14px; padding: 6px 0; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>🍙 비즈니스 일본어 30일 아카데미</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab(event, 'dashboard')">🍡 홈</button>
                <button class="nav-btn" onclick="switchTab(event, 'learning')">📖 학습하기</button>
                <button class="nav-btn" onclick="switchTab(event, 'quiz')">🧩 퀴즈방</button>
                <button class="nav-btn" onclick="switchTab(event, 'vocab')">🔍 표현장</button>
            </div>
        </div>

        <div id="dashboard" class="app-content active">
            <div class="progress-banner">
                <div class="progress-text" id="progressText">0일 완수! 목표를 향해 멋지게 나아가는 중이에요! 🚀</div>
                <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            </div>
            
            <div class="pc-roadmap-view" id="pcRoadmapGrid"></div>
            
            <div class="mobile-diary-view">
                <aside class="diary-sidebar" id="mobileWeekSidebar"></aside>
                <main class="diary-panel">
                    <div class="week-title-box">
                        <h2 id="mobileWeekTitle">Week 1: 사내 기본 소통 모듈</h2>
                        <p id="mobileWeekGoal">🎯 목표: 로딩 중...</p>
                    </div>
                    <div class="mobile-day-grid" id="mobileDayGrid"></div>
                </main>
            </div>
        </div>

        <div id="learning" class="app-content">
            <div id="apiConfigContainer" class="api-config-box"></div>

            <div class="selector-container">
                <span class="selector-label">📖 학습 목표 일차 선택:</span>
                <select id="learningDaySelect" class="round-select" onchange="onLearningDayChange()"></select>
            </div>
            
            <div class="engine-mode-selector">
                <button class="mode-toggle-btn active" id="btnModeChat" onclick="switchLearningMode('chat')">📹 줌 실전 롤플레잉</button>
                <button class="mode-toggle-btn" id="btnModeCard" onclick="switchLearningMode('card')">🎴 콤팩트 카드 플립</button>
            </div>

            <div id="learningChatArea" class="zoom-window">
                <div class="zoom-grid">
                    <div class="zoom-feed" id="feedManager">
                        <div class="avatar">👨‍💼</div>
                        <div class="name-tag">佐藤 課長 (사토 팀장)</div>
                    </div>
                    <div class="zoom-feed" id="feedUser">
                        <div class="avatar">💻</div>
                        <div class="name-tag">팀원 (나)</div>
                    </div>
                </div>
                
                <div class="zoom-chat-log" id="zoomChatLog">
                    <div class="zoom-msg manager"><b>사토 팀장:</b> 회의 대기 중... 아래 [미팅 입장]을 눌러주세요.</div>
                </div>

                <div class="zoom-controls-bar">
                    <button class="btn btn-primary" id="zoomActionBtn" style="width:140px; font-size:18px;" onclick="startZoomMeeting()">미팅 입장 🟢</button>
                    <button class="zoom-btn" id="zoomMicBtn" style="display:none;" onclick="toggleToggleMic()"><i class="fa-solid fa-microphone"></i></button>
                </div>
            </div>

            <div id="learningCardArea" class="flip-cards-grid" style="display:none;"></div>
        </div>

        <div id="quiz" class="app-content">
            <div class="selector-container">
                <span class="selector-label">🎯 검증 퀴즈 데이:</span>
                <select id="quizDaySelect" class="round-select" onchange="onQuizDayChange()"></select>
            </div>
            <div class="quiz-box">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 700; color: var(--primary); font-size: 22px;">
                    <span id="quizStep">1 / 10 단계</span>
                    <span id="quizScore">성공 개수: 0</span>
                </div>
                <div class="quiz-header" id="questionText">문제를 세팅 중입니다...</div>
                <div class="answer-zone" id="answerZone"></div>
                <div class="word-pool" id="wordPool"></div>
                <div class="quiz-controls">
                    <button class="btn btn-secondary" onclick="clearAnswer()">다시 하기</button>
                    <button class="btn btn-primary" id="actionBtn" onclick="checkAnswer()">정답 확인! ✨</button>
                </div>
                <div class="feedback-msg" id="feedbackMsg" style="text-align: center; margin-top: 20px; font-weight: 700; font-size: 22px;"></div>
            </div>
        </div>

        <div id="vocab" class="app-content">
            <div class="selector-container">
                <span class="selector-label">🔍 일차별 마스터 북:</span>
                <select id="vocabDaySelect" class="round-select" onchange="renderVocab()"></select>
            </div>
            <div id="vocabContainer"></div>
        </div>
    </div>

    <div class="modal" id="dayModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">❌</button>
            <h2 id="modalDayNum">DAY 01</h2>
            <h3 id="modalDayTitle">과정명</h3>
            <div id="modalDayBody"></div>
        </div>
    </div>

    <script>
        const totalDays = 30;
        let selectedDay = 1;
        let currentWeek = 1;
        let currentQIdx = 0;
        let currentAns = [];
        let activeLearningMode = 'chat';
        
        let zoomConversationHistory = [];
        let speechRecognitionEngine = null;
        let isMicRecording = false;

        const curriculumWeeks = {
            1: { title: "Week 1: 사내 기본 소통 모듈", goal: "출근인사, 지시 수락 및 업무 공유 매너", start: 1, end: 5 },
            2: { title: "Week 2: 주간 보고 및 사내 협업", goal: "주간 업무 보고 노하우 및 메신저/화상 회의 연동", start: 6, end: 10 },
            3: { title: "Week 3: 미팅 고도화 및 메일 작성", goal: "회의 중 찬반 피칭과 외부 파트너 메일 첫인사", start: 11, end: 15 },
            4: { title: "Week 4: 외부 파트너 실전 응대", goal: "미팅 시간 조율 매너, 전화 수신 및 명함 교환", start: 16, end: 20 },
            5: { title: "Week 5: 위기 대응 및 조건 협상", goal: "일정 지연 사전 조율 및 마감 기한 조절 네고", start: 21, end: 25 },
            6: { title: "Week 6: 최종 조율 및 비즈니스 마스터", goal: "미팅 변경 최종 확정 및 종합 졸업 테스트", start: 26, end: 30 }
        };

        const curriculumTitles = {
            1: "상사의 지시 수락과 기한 확인 ⏰", 2: "마감 확답과 완료 보고 📝", 3: "갑작스러운 트러블 대면 보고 🚨",
            4: "자리 비움 상태 공유하기 🏃", 5: "타 부서에 협조 및 리소스 요청 🤝", 6: "한 주를 마무리하는 주간 완료 보고 📊",
            16: "파일 첨부 안내와 일정 조율 🗓️", 17: "전화 수신 및 담당자 연결 매너 📞", 18: "부재중 상사를 위한 메모 남기기 ✏️",
            19: "방문객 마중과 사무실 안내 🏢", 20: "비즈니스 명함 교환 프로토콜 📇"
        };

        const masterExpressions = {
            1: [
                { js: ["おはよう", "ございます"], kr: "안녕하세요", pron: "오하요- 고자이마스", comment: "출근 시 동료나 상사와 마주쳤을 때 신뢰감을 주는 사내 필수 첫인사 아침 컴포넌트입니다." },
                { js: ["お疲れ様", "です"], kr: "수고하십니다", pron: "오츠카레사마데스", comment: "사내 복도 이동, 대면 업무 요청 등 시간대에 무관하게 대화를 시작할 때 쓰는 사내 만능 소통어입니다." },
                { js: ["失礼", "します"], kr: "실례합니다", pron: "시츠레이시마스" , comment: "타 부서 회의실이나 상사 자리에 진입할 때 혹은 퇴근 선언 시 사용하는 정중한 경계 진입 표현입니다."},
                { js: ["分かりました"], kr: "알겠습니다 / 확인했습니다", pron: "와카리마시타", comment: "상사의 지시나 업무 분배 내용을 즉각 수락하며 업무 파이프라인의 안전성을 알리는 기본 확약 호응어입니다." },
                { js: ["いつまでに", "すれば", "いいですか"], kr: "언제까지 하면 되나요?", pron: "이츠마데니 스레바 이이데스카", comment: "데드라인을 선제적으로 동기화하여 업무 우선순위를 리밸런싱하고 병목 현상을 미리 방지하는 리스크 관리형 역질문입니다." }
            ]
        };

        for(let d=2; d<=totalDays; d++) {
            masterExpressions[d] = [
                { js: ["スケジュール가", "変更に", "なりました"], kr: "일정이 변경되었습니다", pron: "스케쥬-루가 헨코-니 나리마시타", comment: "프로젝트 스프린트 스케줄 변동 시 기한을 재동기화하는 문장입니다." },
                { js: ["ご確認を", "お願いします"], kr: "확인 부탁드립니다", pron: "고카쿠닌오 오네가이시마스", comment: "보고제출물 가공 완료 후 검토 루프를 여는 정중한 피드백 요청어입니다." }
            ];
        }

        window.onload = function() {
            if(!localStorage.getItem('completedDays')) { localStorage.setItem('completedDays', JSON.stringify([])); }
            renderApiConfigBox(); /* 🔐 로드 시점에 인증 박스 상태 렌더링 가동 */
            initSelectors();
            renderPCRoadmap();
            renderMobileSidebar();
            renderMobileDashboard();
        };

        /* 🔐 API 인증 여부에 따라 UI 레이아웃을 동적으로 컨트롤하는 스위칭 함수 */
        function renderApiConfigBox() {
            const container = document.getElementById('apiConfigContainer');
            const savedKey = localStorage.getItem('gemini_api_key_v3');
            
            if(savedKey) {
                // 키가 보존되어 있으면 입력 필드를 가리고 깔끔한 배지만 출력
                container.innerHTML = `
                    <div class="api-active-state">
                        <span>🔐 Gemini AI 라이브 싱크 인증 완료</span>
                        <button class="btn btn-secondary" style="padding:4px 12px; font-size:14px; width:auto; border-radius:8px; box-shadow:none; border-color:#999;" onclick="clearApiKey()">키 변경</button>
                    </div>`;
            } else {
                // 키가 없거나 변경 요청 시 입력 폼 인터페이스 오픈
                container.innerHTML = `
                    <label style="font-weight:700; color:var(--primary); font-size:15px;">🔑 Gemini API 인증 설정 (Free Tier 연동):</label>
                    <div class="api-input-row">
                        <input type="password" id="apiKeyField" class="api-input" placeholder="Google AI Studio에서 발급받은 AI자(AIza)로 시작하는 키 입력">
                        <button class="btn btn-primary" style="padding:4px 15px; font-size:16px; width:auto; border-radius:8px;" onclick="saveApiKey()">인증</button>
                    </div>`;
            }
        }

        function saveApiKey() {
            const rawKey = document.getElementById('apiKeyField').value.trim();
            if(!rawKey) { alert("API 키를 정확하게 입력해 주세요!"); return; }
            
            localStorage.setItem('gemini_api_key_v3', rawKey);
            alert("API Key가 브라우저에 영구 등록되었습니다! 이제 매번 입력할 필요가 없어요. 🔐");
            renderApiConfigBox();
        }

        function clearApiKey() {
            if(confirm("기존에 저장된 API Key 정보를 클리어할까?")) {
                localStorage.removeItem('gemini_api_key_v3');
                renderApiConfigBox();
            }
        }

        function initSelectors() {
            const lSelect = document.getElementById('learningDaySelect');
            const qSelect = document.getElementById('quizDaySelect');
            const vSelect = document.getElementById('vocabDaySelect');
            lSelect.innerHTML = ''; qSelect.innerHTML = ''; vSelect.innerHTML = '';
            for(let i=1; i<=totalDays; i++) {
                const opt = `<option value="${i}">DAY ${String(i).padStart(2, '0')}</option>`;
                lSelect.innerHTML += opt; qSelect.innerHTML += opt; vSelect.innerHTML += opt;
            }
        }

        function renderPCRoadmap() {
            const grid = document.getElementById('pcRoadmapGrid'); grid.innerHTML = '';
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            for(let i=1; i<=totalDays; i++) {
                const card = document.createElement('div');
                card.className = `day-card ${(completedList.includes(i)) ? 'completed' : ''}`;
                card.onclick = () => openModal(i);
                card.innerHTML = `<div class="day-num">${String(i).padStart(2, '0')}</div><div class="day-title">${curriculumTitles[i] || '비즈니스 심화 실무 회화'}</div><div class="day-status">${(completedList.includes(i)) ? '💮 완료' : '☕ 대기'}</div>`;
                grid.appendChild(card);
            }
        }

        function renderMobileSidebar() {
            const sidebar = document.getElementById('mobileWeekSidebar'); sidebar.innerHTML = '';
            for(let i=1; i<=6; i++) {
                const tab = document.createElement('div');
                tab.className = `week-tab ${currentWeek === i ? 'active' : ''}`;
                tab.innerText = `WEEK ${i}`;
                tab.onclick = () => { currentWeek = i; renderMobileSidebar(); renderMobileDashboard(); };
                sidebar.appendChild(tab);
            }
        }

        function renderMobileDashboard() {
            const grid = document.getElementById('mobileDayGrid'); grid.innerHTML = '';
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            const w = curriculumWeeks[currentWeek];
            document.getElementById('mobileWeekTitle').innerText = w.title;
            document.getElementById('mobileWeekGoal').innerText = `🎯 목표: ${w.goal}`;

            for(let i = w.start; i <= w.end; i++) {
                const card = document.createElement('div');
                card.className = `day-card ${(completedList.includes(i)) ? 'completed' : ''}`;
                card.onclick = () => openModal(i);
                card.innerHTML = `<div class="day-num">${String(i).padStart(2, '0')}</div><div class="day-title">${curriculumTitles[i] || '비즈니스 실전 회화'}</div><div class="day-status">${(completedList.includes(i)) ? '💮 완료' : '☕ 대기'}</div>`;
                grid.appendChild(card);
            }
            updateGauges();
        }

        function updateGauges() {
            const completedList = JSON.parse(localStorage.getItem('completedDays')) || [];
            const pct = Math.round((completedList.length / totalDays) * 100);
            document.getElementById('progressText').innerText = `${completedList.length}일 완수! 목표를 향해 멋지게 나아가는 중이에요! 🚀`;
            document.getElementById('progressBarFill').style.width = `${pct}%`;
        }

        function switchTab(e, tabId) {
            document.querySelectorAll('.app-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            if(e) e.currentTarget.classList.add('active');
            if(tabId === 'dashboard') { renderPCRoadmap(); renderMobileDashboard(); }
            if(tabId === 'learning') { initLearningEngine(); }
        }

        function onLearningDayChange() {
            selectedDay = parseInt(document.getElementById('learningDaySelect').value);
            initLearningEngine();
        }

        function switchLearningMode(mode) {
            activeLearningMode = mode;
            document.getElementById('btnModeChat').classList.toggle('active', mode === 'chat');
            document.getElementById('btnModeCard').classList.toggle('active', mode === 'card');
            document.getElementById('learningChatArea').style.display = mode === 'chat' ? 'flex' : 'none';
            document.getElementById('learningCardArea').style.display = mode === 'card' ? 'grid' : 'none';
            initLearningEngine();
        }

        function initLearningEngine() {
            document.getElementById('zoomChatLog').innerHTML = '<div class="zoom-msg manager"><b>사토 팀장:</b> 미팅룸 대기 중... 하단의 [미팅 입장]을 눌러주세요.</div>';
            document.getElementById('zoomMicBtn').style.display = 'none';
            document.getElementById('zoomActionBtn').style.display = 'inline-block';
            document.getElementById('zoomActionBtn').innerText = "미팅 입장 🟢";
            zoomConversationHistory = [];
            if(activeLearningMode === 'card') { renderFlipCards(); }
        }

        async function startZoomMeeting() {
            const apiKey = localStorage.getItem('gemini_api_key_v3');
            if(!apiKey) { alert("Gemini API 인증이 필요해! 상단에서 키를 먼저 등록해줘."); return; }

            document.getElementById('zoomActionBtn').style.display = 'none';
            document.getElementById('zoomMicBtn').style.display = 'flex';
            
            const logZone = document.getElementById('zoomChatLog');
            logZone.innerHTML = '<div class="zoom-msg manager"><i>사토 팀장님이 가상 줌 링크에 커넥팅 중입니다... 🎧</i></div>';

            const targetContext = curriculumTitles[selectedDay] || "비즈니스 일어 소통";
            
            // 🧠 바이링구얼 코칭 페르소나 및 다형성 핸들링 프롬프트 설계 완료
            const systemPrompt = `당신은 일본 IT 기업의 영리한 상사이자, 친절하게 가이드라인을 제시해주는 한국어 능통 '사토 과장' 매니저입니다. 사용자는 당신의 하위 팀원입니다. 
            현재 대화 테마 및 맥락은 [${targetContext}]입니다.
            
            [동작 및 커뮤니케이션 오퍼레이션 시스템 규칙]:
            1. 사용자가 미팅룸에 들어왔으니 한국어로 오늘의 학습 맥락을 편안하게 브리핑하고, 이번 상황에 매칭되는 첫 실전 비즈니스 일본어 대사를 건네세요.
            2. 사용자가 한국어로 질문하거나, 한국어 음성을 전송하거나, 어설픈 일어로 대답하면 시스템은 즉시 반응형 인터랙티브 모드로 작동해야 합니다. 사용자의 한국어 의도를 완벽 파악한 뒤 "아, 그런 맥락이군요! 그럴 때는 이렇게 발음하시면 스마트합니다."라고 친절한 한국어 피드백 가이드를 선행 출력하세요.
            3. 모든 답변의 구조는 반드시 다음 포맷을 엄격하게 유지하여 가독성을 확보하세요:
               [매니저 가이드 (한국어 설명 및 안내)]
               佐藤課長: "(실전 비즈니스 일본어 대사 딱 한 줄)"
               [🎧 발음 및 실무 뉘앙스 팁: ...]`;

            zoomConversationHistory = [{ role: 'user', parts: [{ text: systemPrompt + " 자, 롤플레잉 첫 오프닝 세션을 한국어 안내와 함께 시작해 주세요." }] }];
            callGeminiLive();
        }

        async function callGeminiLive() {
            const apiKey = localStorage.getItem('gemini_api_key_v3').trim();
            const logZone = document.getElementById('zoomChatLog');
            document.getElementById('feedManager').classList.add('active-speaker');

            try {
                // 2026 안정성 검증이 끝난 2.5-flash 파이프라인 엔드포인트 적용
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: zoomConversationHistory })
                });
                
                if (!response.ok) {
                    const errorResponseData = await response.json().catch(() => ({}));
                    const exactServerMessage = errorResponseData.error?.message || "정의되지 않은 서버 에러";
                    throw new Error(`구글 서버 반환코드 (${response.status}): ${exactServerMessage}`);
                }

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                // 일어 텍스트 음성 합성용 전처리를 위해 구조 분해 파싱
                let jpLine = "";
                if(reply.includes('佐藤課長:')) {
                    jpLine = reply.split('佐藤課長:')[1].split('\n')[0].replace(/"/g, '').trim();
                } else {
                    jpLine = reply.split('\n')[0];
                }

                zoomConversationHistory.push({ role: 'model', parts: [{ text: reply }] });

                const msgDiv = document.createElement('div');
                msgDiv.className = 'zoom-msg manager';
                //  markdown 개행 문자를 브라우저 <br> 노드로 변환 적용
                msgDiv.innerHTML = `<b>사토 팀장:</b><br><span style="font-size:16px; line-height:1.5; color:#fff; white-space:pre-wrap;">${reply}</span>`;
                
                logZone.appendChild(msgDiv);
                logZone.scrollTop = logZone.scrollHeight;

                // AI 가 뱉은 대사 중 순수 일어 컴포넌트만 음성 피드백(TTS) 가동
                if(jpLine) { executeNativeTTS(jpLine); }
            } catch(e) {
                console.error("실제 내부 상세 트래킹:", e);
                logZone.innerHTML += `<div class="zoom-msg user" style="color:#ff8b8b; font-weight:700;">❌ 구동 오류 안내:<br>${e.message}</div>`;
            } finally {
                document.getElementById('feedManager').classList.remove('active-speaker');
            }
        }

        function toggleToggleMic() {
            const micBtn = document.getElementById('zoomMicBtn');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if(!SpeechRecognition) { alert("현재 기기 혹은 브라우저 환경이 STT 컴포넌트를 지원하지 않습니다."); return; }

            if(!speechRecognitionEngine) {
                speechRecognitionEngine = new SpeechRecognition();
                // 사용자가 한국어로도 자유롭게 질문하고 리드할 수 있도록 기본 입력 로캘을 한국어로 확장 싱크
                speechRecognitionEngine.lang = 'ko-KR'; 
                speechRecognitionEngine.interimResults = false;

                speechRecognitionEngine.onresult = function(e) {
                    const resultText = e.results[0][0].transcript;
                    const logZone = document.getElementById('zoomChatLog');
                    
                    const userDiv = document.createElement('div');
                    userDiv.className = 'zoom-msg user';
                    userDiv.innerHTML = `<b>나 (팀원):</b> 🎤 <i>${resultText}</i>`;
                    logZone.appendChild(userDiv);
                    logZone.scrollTop = logZone.scrollHeight;

                    zoomConversationHistory.push({ role: 'user', parts: [{ text: resultText }] });
                    callGeminiLive();
                };

                speechRecognitionEngine.onend = function() {
                    isMicRecording = false;
                    micBtn.classList.remove('mic-on');
                    document.getElementById('feedUser').classList.remove('active-speaker');
                };
            }

            if(!isMicRecording) {
                speechRecognitionEngine.start();
                isMicRecording = true;
                micBtn.classList.add('mic-on');
                document.getElementById('feedUser').classList.add('active-speaker');
            } else {
                speechRecognitionEngine.stop();
            }
        }

        function executeNativeTTS(rawText) {
            if('speechSynthesis' in window) {
                const voiceUtterance = new SpeechSynthesisUtterance(rawText);
                voiceUtterance.lang = 'ja-JP';
                window.speechSynthesis.speak(voiceUtterance);
            }
        }

        function renderFlipCards() {
            const area = document.getElementById('learningCardArea'); area.innerHTML = '';
            const list = masterExpressions[selectedDay] || masterExpressions[1];
            list.forEach((data, idx) => {
                const scene = document.createElement('div'); scene.className = 'flip-card-scene';
                scene.onclick = () => scene.classList.toggle('flipped');
                scene.innerHTML = `
                    <div class="flip-card-inner">
                        <div class="flip-card-face flip-card-front">
                            <span style="font-size:13px; color:var(--text-muted);">표현 0${idx+1}</span>
                            <strong style="font-size:22px; color:var(--primary);">${data.js.join(' ')}</strong>
                            <span>🎧 ${data.pron}</span>
                        </div>
                        <div class="flip-card-face flip-card-back">
                            <span style="font-weight:700;">📌 뜻: ${data.kr}</span>
                            <p style="font-size:14px; margin-top:4px;">${data.comment}</p>
                        </div>
                    </div>`;
                area.appendChild(scene);
            });
        }

        function openModal(day) {
            document.getElementById('modalDayNum').innerText = `DAY ${String(day).padStart(2, '0')}`;
            document.getElementById('modalDayTitle').innerText = curriculumTitles[day] || "비즈니스 회화 과정";
            const list = masterExpressions[day] || masterExpressions[1];
            let listHtml = "";
            list.forEach((item, idx) => {
                listHtml += `<div class="review-line"><b>${idx+1}.</b> <code>${item.js.join(' ')}</code><div style="color:var(--error)">🎧 발음: ${item.pron}</div><div style="color:var(--text-main)">📝 뜻: ${item.kr}</div></div>`;
            });
            document.getElementById('modalDayBody').innerHTML = `<div class="review-box"><h4>💡 핵심 요약 프리뷰</h4>${listHtml}</div>`;
            document.getElementById('dayModal').classList.add('active');
        }
        function closeModal() { document.getElementById('dayModal').classList.remove('active'); }
    </script>
</body>
</html>
